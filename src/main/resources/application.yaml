server:
  port: 8080

spring:
  application:
    name: returns-orchestrator

  # THE SAFETY SWITCH
  # We exclude these because you have the dependencies in your build.gradle,
  # but we haven't given the app a real SQL Server URL yet.
  # This prevents "Failed to configure a DataSource" errors on startup.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.r2dbc.R2dbcAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

logging:
  level:
    root: INFO
    com.jhayes.returns: DEBUG # Helps us see our own logic in the console