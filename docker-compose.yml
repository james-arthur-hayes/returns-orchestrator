version: '3.8'

services:
  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: returns-sql-server
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Hayeja123!
      - MSSQL_PID=Developer
    volumes:
      - mssql-data:/var/opt/mssql
    # 1. Added a health check so other containers know exactly when the DB engine is fully ready
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "Hayeja123!", "-C", "-Q", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # 2. Automated initialization worker sidecar
  sql-server-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: returns-sql-server-init
    depends_on:
      sql-server:
        condition: service_healthy
    entrypoint:
      - /bin/bash
      - -c
      - |
        echo "SQL Server is online. Verifying catalog schema..."
        /opt/mssql-tools18/bin/sqlcmd -S sql-server -U sa -P "Hayeja123!" -C -Q "IF NOT EXISTS (SELECT * FROM sys.databases WHERE name = 'returns_db') CREATE DATABASE returns_db;"
        echo "Database returns_db verified/created successfully. Shutting down initializer daemon."

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: returns-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: returns-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

volumes:
  mssql-data: